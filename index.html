<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a1a1a;
    font-family: sans-serif;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }
  
	body {
		background: linear-gradient(-45deg, #DCD021, #2BDC58, #4C79D9, #3AD4DB);
		background-size: 400% 400%;
		animation: gradient 15s ease infinite;
	}

	@keyframes gradient {
		0% {
			background-position: 0% 50%;
		}
		50% {
			background-position: 100% 50%;
		}
		100% {
			background-position: 0% 50%;
		}
	}
  

  /* ── Swiper wrapper ── */
  .swiper {
    width: 100%; height: 100%;
  }

  .swiper-slide {
    position: relative;
    overflow: hidden;
  }

  /* ── Polaroid card ── */
  .card {
    position: absolute;
    background-color: #ffffff;
    -webkit-background-color: #ffffff;
    padding: 10px 10px 32px 10px;
    box-shadow: 2px 4px 14px rgba(0,0,0,0.45), 0 1px 3px rgba(0,0,0,0.3);
    cursor: pointer;
    will-change: transform;
    transition: box-shadow 0.15s;
    -webkit-user-select: none;
    user-select: none;
    -webkit-transform-style: flat;
    transform-style: flat;
    isolation: isolate;
  }

  .card:active { box-shadow: 4px 8px 24px rgba(0,0,0,0.6); }

  .card .media-wrap {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #333;
    position: relative;
    border-radius: 1px;
  }

  .card img,
  .card video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
  }

  .card .play-icon {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.75);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }

  .card .play-icon::after {
    content: '';
    border-style: solid;
    border-width: 8px 0 8px 16px;
    border-color: transparent transparent transparent #333;
    margin-left: 3px;
  }

  /* ── Pseudo-Fullscreen Modal ── */
  #fs-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(0,0,0,0.95);
    align-items: center;
    justify-content: center;
    touch-action: none;
  }

  #fs-modal.active { display: flex; }

  #fs-modal img,
  #fs-modal video {
    max-width: 100vw;
    max-height: 100vh;
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    display: block;
  }

  #fs-close {
    position: absolute;
    top: 16px; right: 16px;
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.2);
    border: none; border-radius: 50%;
    color: #fff; font-size: 20px; line-height: 36px; text-align: center;
    cursor: pointer; z-index: 10000;
  }

  /* ── Lazy load placeholder ── */
  .card .media-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #2a2a2a 25%, #333 50%, #2a2a2a 75%);
    background-size: 200% 200%;
    animation: shimmer 1.4s infinite;
    z-index: 0;
  }

  .card img.loaded,
  .card video.loaded { position: relative; z-index: 1; }

  .card .media-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    pointer-events: none;
    z-index: 1;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>

<script>
    // Función para activar el modo pantalla completa
    function activarPantallaCompleta() {
        const elem = document.documentElement; // Selecciona toda la página

        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) { /* Safari / Chrome / Opera / Edge Chromium */
            elem.webkitRequestFullscreen();
        } else if (elem.mozRequestFullScreen) { /* Firefox */
            elem.mozRequestFullScreen();
        } else if (elem.msRequestFullscreen) { /* IE11 / Edge antiguo */
            elem.msRequestFullscreen();
        }

        // Opcional: Eliminar el listener después de que se active una vez
        document.removeEventListener('click', activarPantallaCompleta);
    }

    // Escucha un clic en cualquier parte del documento
    document.addEventListener('click', activarPantallaCompleta);
</script>

// Flatten all stages in chronological order for the carousel
const MEDIA_ITEMS = LIFE_STAGES.flatMap(stage => stage.items);

// ─────────────────────────────────────────────
//  Google Drive URL Resolver
// ─────────────────────────────────────────────
function resolveUrl(url, type) {
  const driveMatch = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (driveMatch) {
    const id = driveMatch[1];
    if (type === 'video') {
      // Drive preview iframe URL — only reliable CORS-safe option for video embed
      return { embed: `https://drive.google.com/file/d/${id}/preview`, direct: `https://drive.google.com/uc?export=download&id=${id}` };
    }
    // thumbnail endpoint supports CORS for <img> sub-resources
    return `https://drive.google.com/thumbnail?id=${id}&sz=w1000`;
  }
  if (type === 'video') return { embed: url, direct: url };
  return url;
}

// ─────────────────────────────────────────────
//  Layout Engine
// ─────────────────────────────────────────────
const COLS_PORTRAIT  = 3;
const ROWS_LANDSCAPE = 1;
const JITTER_ROT     = 8;   // degrees
const JITTER_PX      = 15;  // pixels
const ITEMS_PER_SLIDE = 9;  // cards per swiper slide
const POLAROID_BOTTOM = 32;
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

function rand(rng, min, max) {
  return min + rng() * (max - min);
}

function buildSlideLayout(itemsInSlide, slideIndex) {
  const isPortrait = window.matchMedia('(orientation: portrait)').matches;
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const rng = seededRandom(slideIndex * 997 + 1);

  let positions = [];

  if (isPortrait) {
    // 2-column vertical grid
    const cols = COLS_PORTRAIT;
    const cellW = vw / cols;
    const cardW = cellW * 0.82;
    const cardH = cardW * 1.1;
    const cellH = cardH + 20;

    for (let i = 0; i < itemsInSlide; i++) {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const baseX = col * cellW + (cellW - cardW) / 2;
      const baseY = row * cellH + 20;
      const rot   = rand(rng, -JITTER_ROT, JITTER_ROT);
      const ox    = rand(rng, -JITTER_PX, JITTER_PX);
      const oy    = rand(rng, -JITTER_PX, JITTER_PX);
      positions.push({ x: baseX + ox, y: baseY + oy, w: cardW, h: cardH, rot });
    }
  } else {
    // 2-row horizontal grid
    const rows = ROWS_LANDSCAPE;
    const cellH = vh / rows;
    const cardH = cellH * 0.78;
    const cardW = cardH * 0.85;
    const cellW = cardW + 20;

    for (let i = 0; i < itemsInSlide; i++) {
      const row = i % rows;
      const col = Math.floor(i / rows);
      const baseX = col * cellW + 20;
      const baseY = row * cellH + (cellH - cardH) / 2;
      const rot   = rand(rng, -JITTER_ROT, JITTER_ROT);
      const ox    = rand(rng, -JITTER_PX, JITTER_PX);
      const oy    = rand(rng, -JITTER_PX, JITTER_PX);
      positions.push({ x: baseX + ox, y: baseY + oy, w: cardW, h: cardH, rot });
    }
  }

  return positions;
}

// ─────────────────────────────────────────────
//  Slide & Card DOM Builder
// ─────────────────────────────────────────────

// IntersectionObserver-based lazy loader (replaces Swiper lazy)
const lazyObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (!entry.isIntersecting) return;
    const el = entry.target;
    if (el.dataset.src) {
      el.src = el.dataset.src;
      delete el.dataset.src;
      lazyObserver.unobserve(el);
    }
  });
}, { rootMargin: '0px' });

function createMediaEl(item, lazy) {
  const src = resolveUrl(item.url, item.type);

  if (item.type === 'video') {
    const iframe = document.createElement('iframe');
    iframe.src = src.embed;
    iframe.allow = 'autoplay';
    iframe.setAttribute('allowfullscreen', '');
    return iframe;
  } else {
    const img = document.createElement('img');
    img.alt = '';
    if (lazy) {
      img.dataset.src = typeof src === 'string' ? src : src.direct;
      lazyObserver.observe(img);
    } else {
      img.src = typeof src === 'string' ? src : src.direct;
    }
    img.addEventListener('load', () => img.classList.add('loaded'));
    return img;
  }
}

function buildSlides() {
  const wrapper = document.getElementById('swiperWrapper');
  wrapper.innerHTML = '';

  const chunks = [];
  for (let i = 0; i < MEDIA_ITEMS.length; i += ITEMS_PER_SLIDE) {
    chunks.push(MEDIA_ITEMS.slice(i, i + ITEMS_PER_SLIDE));
  }

  chunks.forEach((chunk, slideIdx) => {
    const slide = document.createElement('div');
    slide.className = 'swiper-slide';

    const positions = buildSlideLayout(chunk.length, slideIdx);
    const isPortrait = window.matchMedia('(orientation: portrait)').matches;

    // Compute slide natural size for scroll axis
    let slideContentSize = 0;
    if (isPortrait) {
      positions.forEach(p => {
        const bottom = p.y + p.h + POLAROID_BOTTOM + JITTER_PX + 20;
        if (bottom > slideContentSize) slideContentSize = bottom;
      });
      slide.style.height = slideContentSize + 'px';
      slide.style.width  = '100vw';
    } else {
      positions.forEach(p => {
        const right = p.x + p.w + JITTER_PX + 20;
        if (right > slideContentSize) slideContentSize = right;
      });
      slide.style.width  = slideContentSize + 'px';
      slide.style.height = '100vh';
    }

    chunk.forEach((item, i) => {
      const pos   = positions[i];
      const lazy  = slideIdx > 0;
      const card  = document.createElement('div');
      card.className = 'card';
      card.style.left      = pos.x + 'px';
      card.style.top       = pos.y + 'px';
      card.style.width     = pos.w + 'px';
      card.style.height    = pos.h + POLAROID_BOTTOM + 'px';
      card.style.transform = `rotate(${pos.rot}deg)`;

      const wrap = document.createElement('div');
      wrap.className = 'media-wrap';
      wrap.style.height = pos.h + 'px';

      const el = createMediaEl(item, lazy);
      wrap.appendChild(el);

      if (item.type === 'video') {
        const icon = document.createElement('div');
        icon.className = 'play-icon';
        wrap.appendChild(icon);
      }

      card.appendChild(wrap);
      slide.appendChild(card);

      // Mobile: long-press (1s) via Hammer.js → open fullscreen, release → close
      const hammer = new Hammer(card, { recognizers: [[Hammer.Press, { time: 700 }]] });
      hammer.on('press', () => openFullscreen(item));
      hammer.on('pressup', closeFullscreen);

      // Desktop: double-click → open fullscreen; click outside modal → close
      card.addEventListener('dblclick', (e) => {
        e.stopPropagation();
        openFullscreen(item);
      });
    });

    wrapper.appendChild(slide);
  });
}

// ─────────────────────────────────────────────
//  Pseudo-Fullscreen Modal
// ─────────────────────────────────────────────
const fsModal   = document.getElementById('fs-modal');
const fsContent = document.getElementById('fs-content');
const fsClose   = document.getElementById('fs-close');
let   fsVideo   = null;

function openFullscreen(item) {
  fsContent.innerHTML = '';
  const src = resolveUrl(item.url, item.type);

  if (item.type === 'video') {
    // Use iframe preview in fullscreen too — avoids CORS on Drive video streams
    const iframe = document.createElement('iframe');
    iframe.src = src.embed;
    iframe.allow = 'autoplay; fullscreen';
    iframe.setAttribute('allowfullscreen', '');
    iframe.style.width = '100vw';
    iframe.style.height = '100vh';
    iframe.style.border = 'none';
    fsContent.appendChild(iframe);
    fsVideo = null;
  } else {
    const img = document.createElement('img');
    img.src = typeof src === 'string' ? src : src.direct;
    img.alt = '';
    fsContent.appendChild(img);
    fsVideo = null;
  }

  fsModal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeFullscreen() {
  if (fsVideo) { fsVideo.pause(); fsVideo = null; }
  // Remove iframe src to stop video playback inside it
  const iframes = fsContent.querySelectorAll('iframe');
  iframes.forEach(f => { f.src = ''; });
  fsModal.classList.remove('active');
  fsContent.innerHTML = '';
  document.body.style.overflow = '';
}

fsClose.addEventListener('click', closeFullscreen);
fsModal.addEventListener('click', closeFullscreen);
fsModal.addEventListener('pointerdown', (e) => {
  if (e.target === fsModal) closeFullscreen();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeFullscreen();
});

// ─────────────────────────────────────────────
//  Swiper Initialization
// ─────────────────────────────────────────────
let swiperInstance = null;

function initSwiper() {
  const isPortrait = window.matchMedia('(orientation: portrait)').matches;

  if (swiperInstance) {
    swiperInstance.destroy(true, true);
    swiperInstance = null;
  }

  buildSlides();

  swiperInstance = new Swiper('#mainSwiper', {
    direction: isPortrait ? 'vertical' : 'horizontal',
    slidesPerView: 'auto',
    freeMode: {
      enabled: true,
      momentum: true,
      momentumRatio: 2,
      momentumVelocityRatio: 2.5,
      momentumBounce: false,
      sticky: false,
    },
    touchReleaseOnEdges: true,
    resistanceRatio: 0,
    speed: 800,
    grabCursor: false,
    on: {
      touchStart() {
        if (swiperInstance && swiperInstance.animating) {
          swiperInstance.stopAutoplay && swiperInstance.stopAutoplay();
          // Immediate stop
          const wrapper = swiperInstance.wrapperEl;
          const style = window.getComputedStyle(wrapper);
          const matrix = new DOMMatrix(style.transform);
          wrapper.style.transition = 'none';
          if (isPortrait) {
            wrapper.style.transform = `translateY(${matrix.m42}px)`;
          } else {
            wrapper.style.transform = `translateX(${matrix.m41}px)`;
          }
          swiperInstance.setTransition(0);
        }
      }
    }
  });
}

// ─────────────────────────────────────────────
//  Orientation Change Handler
// ─────────────────────────────────────────────
let orientationTimer = null;

function onOrientationChange() {
  clearTimeout(orientationTimer);
  orientationTimer = setTimeout(() => {
    initSwiper();
  }, 120);
}

window.addEventListener('resize', onOrientationChange);
window.matchMedia('(orientation: portrait)').addEventListener('change', onOrientationChange);

// ─────────────────────────────────────────────
//  Boot
// ─────────────────────────────────────────────
initSwiper();
</script>
